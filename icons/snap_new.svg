<svg
  width="256"
  height="256"
  viewBox="0 0 256 256"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- 背景角丸 - ダークグレー（パディング最小化） -->
  <rect x="4" y="4" width="248" height="248" rx="40" ry="40" fill="#2a2a2a" />
  <rect x="4" y="4" width="248" height="248" rx="40" ry="40" fill="url(#bgSubtle)" />

  <!-- フォルダ タブ -->
  <path
    d="M40 78 L40 68 Q40 58 50 58 L96 58 Q104 58 108 68 L114 78"
    fill="url(#folderGrad)"
  />

  <!-- フォルダ 本体 -->
  <rect x="40" y="78" width="176" height="120" rx="8" ry="8" fill="url(#folderGrad)" />

  <!-- フォルダ 上部の光沢ライン -->
  <rect x="40" y="78" width="176" height="5" rx="2.5" fill="white" opacity="0.15" />

  <!-- フォルダ 下部の影 -->
  <rect x="40" y="190" width="176" height="8" rx="4" fill="black" opacity="0.15" />

  <!-- 稲妻 - ソフトシャドウ -->
  <path
    d="M118 72 L152 72 L130 120 L160 120 L108 204 L122 150 L96 150 Z"
    fill="black"
    opacity="0.2"
    transform="translate(2, 2)"
  />

  <!-- 稲妻 - メイン -->
  <path
    d="M118 72 L152 72 L130 120 L160 120 L108 204 L122 150 L96 150 Z"
    fill="white"
  />

  <defs>
    <!-- 背景の微妙な深み -->
    <radialGradient id="bgSubtle" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#333333" />
      <stop offset="100%" stop-color="#222222" />
    </radialGradient>

    <!-- フォルダ - 青 -->
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E9BF0" />
      <stop offset="100%" stop-color="#0072D0" />
    </linearGradient>
  </defs>
</svg>
